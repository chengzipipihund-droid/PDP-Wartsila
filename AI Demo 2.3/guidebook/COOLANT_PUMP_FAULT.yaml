# Guidebook Entry: Coolant Pump Motor Fault
alarm_id: COOLANT_PUMP_FAULT
name: Coolant Pump Motor Fault
system: Cooling System
severity: CRITICAL

description: |
  Coolant pump motor has failed or is operating abnormally. This typically manifests 
  as low or no coolant flow, leading to inadequate cooling of battery modules.

symptoms:
  - Low coolant flow rate (<80 L/min)
  - Pump motor current abnormal (expected: 5-7A)
  - Rising battery temperature
  - BMS thermal management warnings

root_causes:
  - cause: Motor winding failure
    probability: 0.35
    indicators:
      - Motor current drops to near zero
      - Motor overheating prior to failure
      - Insulation breakdown detected
  
  - cause: Motor bearing seizure
    probability: 0.30
    indicators:
      - Abnormal vibration detected
      - Motor current increases before failure
      - Grinding noise reported
  
  - cause: Impeller blockage or damage
    probability: 0.20
    indicators:
      - Motor current normal but flow low
      - Debris in coolant system
      - Recent maintenance activity
  
  - cause: VFD drive failure
    probability: 0.15
    indicators:
      - VFD fault code present
      - Motor not receiving power
      - Other pumps on same VFD affected

immediate_actions:
  - step: 1
    action: Reduce battery discharge rate to 50%
    verification: Confirm power reduction on EPMS display
    time_limit: Immediate
  
  - step: 2
    action: Check pump motor current reading
    verification: Normal = 5-7A, Failed = <2A or >10A
    time_limit: 30 seconds
  
  - step: 3
    action: Switch to backup coolant pump if available
    verification: Coolant flow rate >100 L/min restored
    time_limit: 2 minutes
  
  - step: 4
    action: If backup unavailable, reduce speed to 15 knots max
    verification: Battery temperature stabilizes <38°C
    time_limit: 5 minutes

diagnostic_steps:
  - Check pump motor current with multimeter
  - Inspect motor for physical damage or overheating
  - Verify VFD status and error codes
  - Check coolant filter for blockage
  - Test motor insulation resistance (>1 MΩ)

related_alarms:
  triggers:
    - COOLANT_FLOW_LOW
    - BATT_OVERTEMP
    - BMS_FAULT_THERMAL
    - BATTERY_ROOM_TEMP_HIGH
    - POWER_LIMIT_ACTIVE
  
  may_also_trigger:
    - HEAT_EXCHANGER_TEMP_HIGH
    - MOTOR_OVERTEMP

causal_relationships:
  # This alarm causes these downstream alarms
  causes:
    - alarm: COOLANT_FLOW_LOW
      delay_seconds: 5
      probability: 0.95
    - alarm: BATT_OVERTEMP
      delay_seconds: 15
      probability: 0.85
    - alarm: BMS_FAULT_THERMAL
      delay_seconds: 25
      probability: 0.75
    - alarm: POWER_LIMIT_ACTIVE
      delay_seconds: 35
      probability: 0.70

preventive_maintenance:
  - Check pump motor bearing every 3 months
  - Replace pump motor every 5 years
  - Clean coolant filter monthly
  - Check motor insulation annually

historical_incidents:
  - incident_id: INC_2023_042
    date: 2023-08-15
    vessel: MV Aurora
    resolution: Replaced pump motor
    downtime_hours: 2
  
  - incident_id: INC_2024_018
    date: 2024-03-22
    vessel: MV Baltic Star
    resolution: Cleared impeller blockage
    downtime_hours: 0.5
