<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Cause Analyzer - Python Backend</title>
    <style>
        /* 复用之前的样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { font-size: 1.2em; opacity: 0.9; }
        .tech-badge {
            display: inline-block;
            background: #27ae60;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-top: 10px;
        }
        
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            color: #333;
        }
        
        .card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #e74c3c;
            padding-bottom: 10px;
        }
        
        .alarm-checkbox {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .alarm-checkbox:hover {
            background: #e8f4f8;
            border-color: #3498db;
        }
        
        .alarm-checkbox.selected {
            background: #e8f5e9;
            border-color: #4caf50;
        }
        
        .alarm-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }
        
        .alarm-name {
            font-weight: 700;
            color: #2c3e50;
        }
        
        .alarm-desc {
            font-size: 12px;
            color: #7f8c8d;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .result-card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 25px;
            color: #333;
            grid-column: 1 / -1;
        }
        
        .root-cause-box {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            border-left: 5px solid #e74c3c;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .confidence-bar {
            width: 100%;
            height: 40px;
            background: #e0e0e0;
            border-radius: 20px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            transition: width 1s;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e74c3c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .selected-count {
            background: #4caf50;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .actions-section {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .alternative-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
        }
        
        .probability-badge {
            background: #3498db;
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            font-weight: 700;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-connected { background: #27ae60; }
        .status-disconnected { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 AI Root Cause Analyzer</h1>
            <p class="subtitle">Intelligent Alarm Diagnosis with Python ML Backend</p>
            <div class="tech-badge">
                <span class="status-indicator" id="serverStatus"></span>
                <span id="serverStatusText">Connecting to Python server...</span>
            </div>
        </header>
        
        <div class="main-grid">
            <div class="card">
                <h2>⚠️ Active Alarms</h2>
                
                <div class="selected-count" id="selectedCount">0 alarms selected</div>
                
                <div id="alarmList">
                    <!-- Alarms loaded dynamically -->
                </div>
                
                <button class="btn" style="background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); margin-top: 10px;" onclick="clearSelection()">
                    🗑️ Clear Selection
                </button>
            </div>
            
            <div class="card">
                <h2>⏱️ Alarm Timeline</h2>
                
                <div id="timeline" style="background: #f8f9fa; padding: 15px; border-radius: 8px; min-height: 200px;">
                    <p style="text-align: center; color: #999;">Select alarms to see their timeline</p>
                </div>
                
                <button class="btn" id="analyzeBtn" onclick="analyzeRootCause()" disabled style="margin-top: 20px;">
                    🤖 Analyze with Python AI
                </button>
            </div>
        </div>
        
        <div class="result-card" id="resultsSection" style="display: none;">
            <h2>🎯 AI Analysis Results (Python Backend)</h2>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        
        // 🔧 CHANGE THIS if your Python server is running elsewhere
        const API_URL = 'http://localhost:5000';
        
        // ============================================
        // ALARM DATABASE
        // ============================================
        
        const alarmDatabase = [
            // Battery System
            { id: 'BATT_OVERTEMP', name: 'Battery Module Overtemperature', timestamp: '14:23:17', system: 'Battery ESS' },
            { id: 'CELL_VOLTAGE_IMBALANCE', name: 'Cell Voltage Imbalance', timestamp: '14:23:22', system: 'Battery ESS' },
            { id: 'BMS_FAULT_THERMAL', name: 'BMS Thermal Management Fault', timestamp: '14:23:35', system: 'Battery ESS' },
            { id: 'POWER_LIMIT_ACTIVE', name: 'Power Limiting Active', timestamp: '14:23:42', system: 'Battery ESS' },
            
            // Cooling System
            { id: 'COOLANT_FLOW_LOW', name: 'Coolant Flow Rate Low', timestamp: '14:23:12', system: 'Cooling System' },
            { id: 'COOLANT_PUMP_FAULT', name: 'Coolant Pump Motor Fault', timestamp: '14:23:08', system: 'Cooling System' },
            { id: 'HEAT_EXCHANGER_TEMP_HIGH', name: 'Heat Exchanger Temperature High', timestamp: '14:23:28', system: 'Cooling System' },
            
            // Electrical
            { id: 'MAIN_BUS_UNDERVOLT', name: 'Main Bus Undervoltage', timestamp: '14:23:40', system: 'Electrical' },
            { id: 'GEN_OVERLOAD', name: 'Generator Overload', timestamp: '14:23:48', system: 'Electrical' },
            
            // HVAC
            { id: 'HVAC_CHILLER_FAULT', name: 'HVAC Chiller Malfunction', timestamp: '14:23:55', system: 'HVAC' },
            { id: 'BATTERY_ROOM_TEMP_HIGH', name: 'Battery Room Temperature High', timestamp: '14:23:25', system: 'HVAC' },
            
            // Propulsion
            { id: 'MOTOR_OVERTEMP', name: 'Propulsion Motor Overtemperature', timestamp: '14:24:05', system: 'Propulsion' },
            { id: 'VFD_FAULT', name: 'Variable Frequency Drive Fault', timestamp: '14:24:10', system: 'Propulsion' }
        ];
        
        let selectedAlarms = [];
        
        // ============================================
        // SERVER CONNECTION
        // ============================================
        
        async function checkServerStatus() {
            try {
                const response = await fetch(`${API_URL}/api/health`);
                const data = await response.json();
                
                if (data.status === 'healthy') {
                    document.getElementById('serverStatus').className = 'status-indicator status-connected';
                    document.getElementById('serverStatusText').textContent = 'Connected to Python AI Server';
                    return true;
                }
            } catch (error) {
                document.getElementById('serverStatus').className = 'status-indicator status-disconnected';
                document.getElementById('serverStatusText').textContent = 'Server Offline - Start Python server!';
                return false;
            }
        }
        
        // ============================================
        // UI INITIALIZATION
        // ============================================
        
        function initializeUI() {
            const alarmList = document.getElementById('alarmList');
            alarmList.innerHTML = '';
            
            alarmDatabase.forEach(alarm => {
                const div = document.createElement('div');
                div.className = 'alarm-checkbox';
                div.id = `alarm-${alarm.id}`;
                div.innerHTML = `
                    <input type="checkbox" id="check-${alarm.id}" onchange="toggleAlarm('${alarm.id}')">
                    <div style="flex: 1;">
                        <div class="alarm-name">${alarm.name}</div>
                        <div class="alarm-desc">${alarm.system} | ${alarm.timestamp}</div>
                    </div>
                `;
                alarmList.appendChild(div);
            });
        }
        
        function toggleAlarm(alarmId) {
            const checkbox = document.getElementById(`check-${alarmId}`);
            const alarmDiv = document.getElementById(`alarm-${alarmId}`);
            
            if (checkbox.checked) {
                if (selectedAlarms.length >= 8) {
                    alert('Maximum 8 alarms');
                    checkbox.checked = false;
                    return;
                }
                selectedAlarms.push(alarmId);
                alarmDiv.classList.add('selected');
            } else {
                selectedAlarms = selectedAlarms.filter(id => id !== alarmId);
                alarmDiv.classList.remove('selected');
            }
            
            updateTimeline();
            updateAnalyzeButton();
        }
        
        function updateTimeline() {
            const timeline = document.getElementById('timeline');
            const count = document.getElementById('selectedCount');
            
            count.textContent = `${selectedAlarms.length} alarm${selectedAlarms.length !== 1 ? 's' : ''} selected`;
            
            if (selectedAlarms.length === 0) {
                timeline.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Select alarms to see their timeline</p>';
                return;
            }
            
            const selectedObjects = selectedAlarms.map(id => 
                alarmDatabase.find(a => a.id === id)
            ).sort((a, b) => a.timestamp.localeCompare(b.timestamp));
            
            let html = '<div style="font-weight: 700; margin-bottom: 15px; color: #2c3e50;">Chronological Order:</div>';
            
            selectedObjects.forEach((alarm, i) => {
                html += `
                    <div style="padding: 8px 0; border-bottom: 1px solid #e0e0e0;">
                        <strong>${i + 1}.</strong> ${alarm.timestamp} - ${alarm.name}
                    </div>
                `;
            });
            
            timeline.innerHTML = html;
        }
        
        function updateAnalyzeButton() {
            const btn = document.getElementById('analyzeBtn');
            if (selectedAlarms.length >= 4 && selectedAlarms.length <= 8) {
                btn.disabled = false;
                btn.textContent = `🤖 Analyze with Python AI (${selectedAlarms.length} alarms)`;
            } else if (selectedAlarms.length < 4) {
                btn.disabled = true;
                btn.textContent = '⚠️ Select at least 4 alarms';
            } else {
                btn.disabled = true;
                btn.textContent = '⚠️ Too many alarms';
            }
        }
        
        function clearSelection() {
            selectedAlarms = [];
            document.querySelectorAll('.alarm-checkbox input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('.alarm-checkbox').forEach(div => div.classList.remove('selected'));
            updateTimeline();
            updateAnalyzeButton();
        }
        
        // ============================================
        // ANALYSIS
        // ============================================
        
        async function analyzeRootCause() {
            // Check server
            const serverOk = await checkServerStatus();
            if (!serverOk) {
                alert('❌ Python server is not running!\n\nPlease start the server:\n  python api_server.py');
                return;
            }
            
            // Show loading
            const resultsSection = document.getElementById('resultsSection');
            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
            
            document.getElementById('resultsContent').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>🐍 Python AI is analyzing alarm patterns...</p>
                    <p style="margin-top: 10px; opacity: 0.7; font-size: 14px;">
                        Running: DBSCAN → Causal Graph → PageRank → Bayesian → NLP Search
                    </p>
                </div>
            `;
            
            // Disable button
            document.getElementById('analyzeBtn').disabled = true;
            
            // Build request
            const alarms = selectedAlarms.map(id => {
                const alarm = alarmDatabase.find(a => a.id === id);
                return {
                    id: alarm.id,
                    type: alarm.id,
                    timestamp: alarm.timestamp
                };
            });
            
            try {
                const response = await fetch(`${API_URL}/api/analyze-simple`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ alarms: alarms })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data.result);
                } else {
                    throw new Error(data.error || 'Analysis failed');
                }
            } catch (error) {
                document.getElementById('resultsContent').innerHTML = `
                    <div style="background: #ffebee; padding: 20px; border-radius: 8px; border-left: 4px solid #e74c3c; color: #c62828;">
                        <strong>❌ Error:</strong> ${error.message}
                        <br><br>
                        <strong>Troubleshooting:</strong>
                        <ul style="margin-top: 10px; margin-left: 20px;">
                            <li>Make sure Python server is running: <code>python api_server.py</code></li>
                            <li>Check server URL is correct: ${API_URL}</li>
                            <li>Verify all dependencies are installed: <code>pip install -r requirements.txt</code></li>
                        </ul>
                    </div>
                `;
                console.error('Analysis error:', error);
            } finally {
                updateAnalyzeButton();
            }
        }
        
        function displayResults(result) {
            let html = `
                <div class="root-cause-box">
                    <div style="font-size: 1.3em; font-weight: 700; color: #c62828; margin-bottom: 10px;">
                        🎯 PRIMARY ROOT CAUSE
                    </div>
                    <h3 style="font-size: 1.5em; margin: 15px 0; color: #c62828;">
                        ${result.root_cause}
                    </h3>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${(result.confidence * 100).toFixed(0)}%;">
                            ${(result.confidence * 100).toFixed(1)}% Confidence
                        </div>
                    </div>
                    <div style="margin-top: 15px; line-height: 1.6;">
                        <strong>Causal Explanation:</strong><br>
                        ${result.explanation || 'No explanation available'}
                    </div>
                </div>
            `;
            
            if (result.alternatives && result.alternatives.length > 0) {
                html += `
                    <div style="margin-top: 20px;">
                        <h3 style="color: #2c3e50; margin-bottom: 15px;">⚖️ Alternative Possible Causes</h3>
                `;
                
                result.alternatives.forEach((alt, i) => {
                    html += `
                        <div class="alternative-item">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-weight: 700; color: #2c3e50; font-size: 1.1em;">
                                    ${i + 1}. ${alt.cause}
                                </span>
                                <span class="probability-badge">
                                    ${(alt.confidence * 100).toFixed(1)}%
                                </span>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            if (result.recommended_actions && result.recommended_actions.length > 0) {
                html += `
                    <div class="actions-section">
                        <h3 style="color: #2e7d32; margin-bottom: 15px;">✅ Recommended Immediate Actions</h3>
                `;
                
                result.recommended_actions.forEach(action => {
                    html += `
                        <div style="padding: 10px 0; border-bottom: 1px solid #c8e6c9;">
                            <strong>${action.step}.</strong> ${action.action}
                            ${action.verification ? `<br><span style="color: #666; font-size: 0.9em;">Verify: ${action.verification}</span>` : ''}
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            html += `
                <div style="margin-top: 20px; background: #e3f2fd; padding: 15px; border-radius: 8px; border-left: 4px solid #2196f3;">
                    <strong>🔬 Analysis Method:</strong><br>
                    ${result.analysis_method || 'DBSCAN → Causal Graph → PageRank → Bayesian Inference → NLP Search'}
                </div>
                
                <button class="btn" onclick="analyzeRootCause()" style="margin-top: 20px;">
                    🔄 Re-analyze
                </button>
                <button class="btn" onclick="clearAndRestart()" style="margin-top: 10px; background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);">
                    🆕 New Analysis
                </button>
            `;
            
            document.getElementById('resultsContent').innerHTML = html;
        }
        
        function clearAndRestart() {
            clearSelection();
            document.getElementById('resultsSection').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // ============================================
        // INITIALIZE
        // ============================================
        
        initializeUI();
        checkServerStatus();
        
        // Check server status every 10 seconds
        setInterval(checkServerStatus, 10000);
    </script>
</body>
</html>
